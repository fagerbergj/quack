# Local full stack: the Quack app + a self-contained Postgres, plus the keyless
# search (SearXNG) and render (crawl4ai) backends the web-researcher
# agent's tools use. One command:
#   cp .env.example .env   # set LLM_ENDPOINT to something reachable from the container
#   docker compose up --build
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: quack
      POSTGRES_PASSWORD: quack
      POSTGRES_DB: quack
    volumes:
      # Postgres 18+ wants the mount at /var/lib/postgresql (data lives in a
      # version subdir), not /var/lib/postgresql/data.
      - quack-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quack"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "5432:5432"

  # Keyless metasearch backend for the web_search tool. The mounted settings.yml
  # enables the JSON API that the tool calls.
  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./deploy/searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
    ports:
      - "8080:8080"

  # Keyless crawl4ai render backend for the web_fetch tool's fallback on
  # JavaScript-heavy / thin pages. POST /md fetches + renders (Playwright) and
  # returns clean Markdown; auth (JWT) is off by default. Needs shared memory for
  # the browser pool.
  crawl4ai:
    image: unclecode/crawl4ai:latest
    shm_size: "1g"
    ports:
      - "11235:11235"

  # Vector store for long-term memory (M4). Keyless by default; the app reads
  # QDRANT_URL. Disable memory by leaving QDRANT_URL / EMBEDDING_MODEL unset.
  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - quack-qdrant:/qdrant/storage
    ports:
      - "6333:6333"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_started
      crawl4ai:
        condition: service_started
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgres://quack:quack@db:5432/quack?sslmode=disable
      # Reachable from inside the container. Override in .env for your setup;
      # host.docker.internal points at an LLM server running on the host.
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://host.docker.internal:11436/v1}
      LLM_API_KEY: ${LLM_API_KEY:-unused}
      ORCH_MODEL: ${ORCH_MODEL:-qwen3.6-35b}
      RESEARCHER_MODEL: ${RESEARCHER_MODEL:-qwen3.6-35b}
      # Independent judge model for the trust gate (empty disables vetting).
      JUDGE_MODEL: ${JUDGE_MODEL:-qwen3.6-35b}
      # The agent's tool backends. Default to the compose services above;
      # override to point at existing instances (e.g. on a home server).
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      CRAWL4AI_URL: ${CRAWL4AI_URL:-http://crawl4ai:11235}
      # Long-term memory (M4). QDRANT_URL defaults to the compose service. The
      # embedding model is served by the same llama-swap as the chat models
      # (LLM_ENDPOINT above), selected by name. Leave EMBEDDING_MODEL empty to
      # disable memory.
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embed}
    # Host 8080 is taken by SearXNG above, so the app is published on 8081.
    ports:
      - "8081:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  quack-pgdata:
  quack-qdrant:
