# Quack configuration. Structure is declarative; ${VAR} are interpolated from
# the environment (secrets never live in this file). See docs/configuration.md.
providers:
  default:
    kind: openai            # API protocol; the endpoint picks the actual server
    endpoint: ${LLM_ENDPOINT}
    api_key: ${LLM_API_KEY}

stores:
  relational:
    kind: postgres
    url: ${DATABASE_URL}
  # Vector store for long-term memory (M4). Leave kind empty to disable memory;
  # when set it must pair with an embeddings block below.
  vector:
    kind: qdrant
    url: ${QDRANT_URL}
    api_key: ${QDRANT_API_KEY}
    collection: quack_memory

# Embedding model used to vectorise findings on commit and queries on recall.
# Empty model disables memory. Routed through the same llama-swap endpoint as the
# chat models (provider: default), selected by model name — qwen3-embed is a
# resident model there, so it never swaps the GPU chat model.
embeddings:
  provider: default
  model: ${EMBEDDING_MODEL}

orchestrator:
  provider: default
  model: ${ORCH_MODEL}          # the thin dispatcher: routes requests to agents

# Declarative agents. Each is an agent-card.json + prompt.md bundle on disk,
# bound here to a model and a selection of built-in tools. Add an agent by
# dropping a bundle directory and adding an entry — no recompile.
agents:
  web-researcher:
    bundle: agents/web-researcher
    provider: default
    model: ${RESEARCHER_MODEL}
    # load_memory (LLM-invoked, visible recall) + preload_memory (auto-injects
    # prior vetted findings). Both no-op gracefully and are stripped when memory
    # is disabled.
    tools: [web_search, web_fetch, summarize, load_memory, preload_memory]
  synthesizer:
    bundle: agents/synthesizer
    provider: default
    model: ${RESEARCHER_MODEL}
    tools: []

# Backend bindings for the built-in tools (keyless, internal services in M1).
tools:
  web_search:
    backend: ${SEARXNG_URL}        # SearXNG JSON API, e.g. http://searxng:8080
  web_fetch:
    render_backend: ${CRAWL4AI_URL}  # crawl4ai /md backend, e.g. http://crawl4ai:11235

# The trust gate wraps every agent: a self-refine pre-pass, then an independent
# judge (a dedicated model) scores the answer against the rubric below, looping
# up to max_rounds or until threshold is met. Leave model empty to disable.
adversarial:
  provider: default
  model: ${JUDGE_MODEL}
  max_rounds: 2
  threshold: 0.7
  self_refine: true
  constitution_path: config/constitution.md   # global principles, used for self-refine + judge
  rubric_path: config/rubric.md               # default scoring guide (agents may override with rubric.md in their bundle)

server:
  addr: ":8080"
