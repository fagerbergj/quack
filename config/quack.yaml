# Quack configuration. Structure is declarative; ${VAR} are interpolated from
# the environment (secrets never live in this file). See docs/configuration.md.
providers:
  default:
    kind: openai            # API protocol; the endpoint picks the actual server
    endpoint: ${LLM_ENDPOINT}
    api_key: ${LLM_API_KEY}

stores:
  relational:
    kind: postgres
    url: ${DATABASE_URL}

orchestrator:
  provider: default
  model: ${ORCH_MODEL}          # the thin dispatcher: routes requests to agents

# Declarative agents. Each is an agent-card.json + prompt.md bundle on disk,
# bound here to a model and a selection of built-in tools. Add an agent by
# dropping a bundle directory and adding an entry — no recompile.
agents:
  web-researcher:
    bundle: agents/web-researcher
    provider: default
    model: ${RESEARCHER_MODEL}
    tools: [web_search, web_fetch, summarize]
  synthesizer:
    bundle: agents/synthesizer
    provider: default
    model: ${RESEARCHER_MODEL}
    tools: []

# Backend bindings for the built-in tools (keyless, internal services in M1).
tools:
  web_search:
    backend: ${SEARXNG_URL}        # SearXNG JSON API, e.g. http://searxng:8080
  web_fetch:
    render_backend: ${CRAWL4AI_URL}  # crawl4ai /md backend, e.g. http://crawl4ai:11235

# The trust gate wraps every agent and runs three stages cheapest-first, each
# with its own round budget (a stage with max_rounds:0 is skipped):
#   1. deterministic_checks — free code checks (citation backing + length) that
#      drive cheap targeted revisions to drop fabricated citations up front.
#   2. self_critique — the worker critiques and revises its own draft.
#   3. judge — an independent model scores the answer; the worker revises on fail.
# Deterministic citation/length scores are always folded into the judge's verdict.
# Leave judge.model empty to disable the judge (the cheaper stages still run).
gates:
  constitution_path: config/constitution.md   # global principles, used for self-critique + judge
  rubric_path: config/rubric.md               # default scoring guide (agents may override with rubric.md in their bundle)
  deterministic_checks:
    max_rounds: 4   # free citation/length checks; up to 4 cheap worker revise cycles
  self_critique:
    max_rounds: 1   # worker self-improvement passes before the judge
  judge:
    provider: default
    model: ${JUDGE_MODEL}   # empty ⇒ judge disabled
    max_rounds: 1           # expensive model-judge/revise rounds
    threshold: 0.7
    max_iterations: 6       # safety cap on the judge's model turns per round

# DAG execution policy.
dag:
  max_active_nodes: 4   # how many nodes run concurrently; extras queue. Matched to the
                        # worker server's --parallel 4 (4 KV slots @ 65536 tokens each);
                        # the CPU judge is also --parallel 4. Raising this past the
                        # worker's slot count just queues requests at the model.

server:
  addr: ":8080"
