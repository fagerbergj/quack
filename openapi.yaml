openapi: 3.0.3
info:
  title: Quack
  version: 0.1.0
  description: |
    Quack's HTTP API. The chat-message endpoint streams over Server-Sent Events
    (Streamable HTTP); the SSE body is not fully expressible in OpenAPI, so its
    event vocabulary is documented in prose and via the `x-sse-events` extension.
servers:
  - url: /

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Liveness check
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /api/v1/chats:
    get:
      operationId: listChats
      summary: List chats
      responses:
        "200":
          description: The chats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatList"
    post:
      operationId: createChat
      summary: Create a chat
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatBody"
      responses:
        "200":
          description: The created chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSummary"

  /api/v1/chats/{chat_id}:
    get:
      operationId: getChat
      summary: Get a chat with its messages
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "200":
          description: The chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteChat
      summary: Delete a chat
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "204":
          description: Deleted

  /api/v1/chats/{chat_id}/messages:
    post:
      operationId: sendChatMessage
      summary: Send a message and stream the response
      description: |
        Streams the orchestrator's response as Server-Sent Events. Each event is
        `event: <name>` followed by `data: <json>`. M0 emits `token` ({"text": "..."})
        and `done` ({}); errors are sent as `error` ({"error": "..."}).
      parameters:
        - $ref: "#/components/parameters/ChatID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      x-sse-events: [token, done, error]
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string

components:
  parameters:
    ChatID:
      name: chat_id
      in: path
      required: true
      schema:
        type: string

  schemas:
    ChatSummary:
      type: object
      required: [id, system_prompt, created_at, updated_at]
      properties:
        id:
          type: string
        system_prompt:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    ChatDetail:
      allOf:
        - $ref: "#/components/schemas/ChatSummary"
        - type: object
          required: [messages]
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/ChatMessage"

    ChatList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatSummary"

    CreateChatBody:
      type: object
      properties:
        system_prompt:
          type: string

    SendMessageBody:
      type: object
      required: [content]
      properties:
        content:
          type: string
