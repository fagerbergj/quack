openapi: 3.0.3
info:
  title: Quack
  version: 0.2.0
  description: |
    Quack's HTTP API, modelled after the OpenResponses specification.
    Each chat turn is a Response containing typed OutputItems. The DAG is a
    first-class output item type (quack:dag) — a custom extension alongside
    the standard message item. The send endpoint streams over Server-Sent Events;
    its vocabulary is documented in prose and via the x-sse-events extension.
servers:
  - url: /

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Liveness check
      responses:
        "200":
          description: OK
          content:
            text/plain:
              schema:
                type: string

  /api/v1/chats:
    get:
      operationId: listChats
      summary: List chats
      responses:
        "200":
          description: The chats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatList"
    post:
      operationId: createChat
      summary: Create a chat
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatBody"
      responses:
        "200":
          description: The created chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatSummary"

  /api/v1/chats/{chat_id}:
    get:
      operationId: getChat
      summary: Get a chat with its turns
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "200":
          description: The chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteChat
      summary: Delete a chat
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "204":
          description: Deleted

  /api/v1/chats/{chat_id}/responses:
    post:
      operationId: sendChatMessage
      summary: Send a message and stream the response
      description: |
        Streams the orchestrator's response as Server-Sent Events. Each event is
        `event: <name>` followed by `data: <json>`.

        The model is flat and agent-centric: the DAG (dag_plan + node_* events) is
        the static structure, and within each node the trust gate runs a SEQUENCE
        of agent invocations ("runs") — the worker draft, an optional self-refine,
        each judge round, and each revision. Every run is delimited by
        `agent_start` / `agent_complete` and carries a `run_id` + `stage`
        (`worker` | `self_refine` | `judge` | `revise`); its activity references
        that `run_id`. Clients group runs by `node_id` and pair tools by `call_id`.

        Agent-run events: `agent_start` ({"node_id","run_id","agent","stage","round"})
        opens a run; `agent_thinking` ({"node_id","run_id","text"}) is reasoning;
        `agent_tool_call` ({"node_id","run_id","call_id","name","args"}) and
        `agent_tool_result` ({"node_id","run_id","call_id","name","result"}) are
        tool activity; `agent_token` ({"node_id","run_id","text"}) is answer text
        (the final vetted answer is emitted with an empty `run_id` — it belongs to
        the node); `agent_complete` ({"node_id","run_id","stage",...}) closes a run
        with its stage-specific result — judge runs carry `score`/`passed`/
        `feedback` (or `status:"unavailable"`+`reason` when the judge couldn't
        run), self_refine carries `changed`, model runs carry `finish_reason` +
        token usage.

        DAG events: `dag_plan` ({"plan_id","nodes","edges"}) signals a quack:dag
        output item has been added; `node_queued` ({"node_id"}), `node_start`
        ({"node_id","agent"}), `node_done` ({"node_id",...metadata}), and
        `node_failed` ({"node_id","error"}) track node lifecycle.

        Lifecycle: `chat_title` ({"title"}) is sent once the title is generated;
        `done` ({}) terminates the stream; `error` ({"error"}) signals failure.
      parameters:
        - $ref: "#/components/parameters/ChatID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      x-sse-events:
        - agent_start
        - agent_thinking
        - agent_tool_call
        - agent_tool_result
        - agent_token
        - agent_complete
        - dag_plan
        - node_queued
        - node_start
        - node_done
        - node_failed
        - chat_title
        - done
        - error
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string

  /api/v1/chats/{chat_id}/responses/{response_id}:
    get:
      operationId: getResponse
      summary: Get a specific response (turn) with its output items
      description: |
        Returns the full Turn for a response ID. Useful for fetching or
        refreshing a specific turn's output items (e.g. a quack:dag item)
        without reloading the full chat.
      parameters:
        - $ref: "#/components/parameters/ChatID"
        - $ref: "#/components/parameters/ResponseID"
      responses:
        "200":
          description: The response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Turn"
        "404":
          description: Not found

  /api/v1/chats/{chat_id}/stream:
    delete:
      operationId: cancelChatStream
      summary: Cancel an in-progress stream
      description: |
        Cancels the active orchestrator run for this chat. No-op if no run is
        in progress. The SSE client should also abort its connection.
      parameters:
        - $ref: "#/components/parameters/ChatID"
      responses:
        "204":
          description: Cancelled (or no active run)

components:
  parameters:
    ChatID:
      name: chat_id
      in: path
      required: true
      schema:
        type: string

    ResponseID:
      name: response_id
      in: path
      required: true
      schema:
        type: string

  schemas:

    # -------------------------------------------------------------------------
    # Chat
    # -------------------------------------------------------------------------

    ChatSummary:
      type: object
      required: [id, system_prompt, created_at, updated_at]
      properties:
        id:
          type: string
        title:
          type: string
        system_prompt:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ChatDetail:
      allOf:
        - $ref: "#/components/schemas/ChatSummary"
        - type: object
          required: [turns]
          properties:
            turns:
              type: array
              items:
                $ref: "#/components/schemas/Turn"

    ChatList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ChatSummary"

    CreateChatBody:
      type: object
      properties:
        system_prompt:
          type: string

    SendMessageBody:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # -------------------------------------------------------------------------
    # Turn (one user→assistant exchange, modelled after OpenResponses Response)
    # -------------------------------------------------------------------------

    Turn:
      type: object
      required: [id, created_at, input, output]
      properties:
        id:
          type: string
        created_at:
          type: string
          format: date-time
        input:
          $ref: "#/components/schemas/TurnInput"
        output:
          type: array
          items:
            $ref: "#/components/schemas/OutputItem"
        usage:
          $ref: "#/components/schemas/Usage"

    TurnInput:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          enum: [user]
        content:
          type: string

    Usage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer

    # -------------------------------------------------------------------------
    # Output items — discriminated by `type`
    # Standard: "message". Quack extension: "quack:dag".
    # -------------------------------------------------------------------------

    OutputItem:
      oneOf:
        - $ref: "#/components/schemas/MessageOutputItem"
        - $ref: "#/components/schemas/DagOutputItem"
      discriminator:
        propertyName: type
        mapping:
          message: "#/components/schemas/MessageOutputItem"
          "quack:dag": "#/components/schemas/DagOutputItem"

    ItemStatus:
      type: string
      enum: [in_progress, completed, incomplete]

    MessageOutputItem:
      type: object
      required: [id, type, status, content]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [message]
        status:
          $ref: "#/components/schemas/ItemStatus"
        content:
          type: array
          items:
            $ref: "#/components/schemas/ContentPart"

    ContentPart:
      oneOf:
        - $ref: "#/components/schemas/OutputTextPart"
        - $ref: "#/components/schemas/ReasoningPart"
      discriminator:
        propertyName: type
        mapping:
          output_text: "#/components/schemas/OutputTextPart"
          reasoning: "#/components/schemas/ReasoningPart"

    OutputTextPart:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [output_text]
        text:
          type: string

    ReasoningPart:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [reasoning]
        text:
          type: string

    # -------------------------------------------------------------------------
    # quack:dag output item — DAG execution as a first-class output type
    # -------------------------------------------------------------------------

    DagOutputItem:
      type: object
      required: [id, type, status, plan_id, nodes, edges, node_states]
      properties:
        id:
          type: string
        type:
          type: string
          enum: ["quack:dag"]
        status:
          $ref: "#/components/schemas/ItemStatus"
        plan_id:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/DagNodeDef"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/DagEdge"
        node_states:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DagNodeState"

    DagNodeDef:
      type: object
      required: [id, agent, task, depends_on]
      properties:
        id:
          type: string
        agent:
          type: string
        task:
          type: string
        depends_on:
          type: array
          items:
            type: string

    DagEdge:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
        to:
          type: string

    DagNodeState:
      type: object
      required: [status]
      properties:
        status:
          type: string
        output_preview:
          type: string
        error:
          type: string
        started_at_ms:
          type: integer
        finished_at_ms:
          type: integer
        model:
          type: string
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        finish_reason:
          type: string
        reasoning_tokens:
          type: integer
        server_duration_ms:
          type: integer
        self_refined:
          type: boolean
        judge_rounds:
          type: integer
        judge_final_score:
          type: number
          format: double
        judge_passed:
          type: boolean
